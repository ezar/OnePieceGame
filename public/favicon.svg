<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#0a3a6b"/>
  <!-- Skull head -->
  <ellipse cx="50" cy="42" rx="22" ry="20" fill="#f5e6c8"/>
  <!-- Eyes (hollow) -->
  <ellipse cx="42" cy="40" rx="6" ry="7" fill="#0a3a6b"/>
  <ellipse cx="58" cy="40" rx="6" ry="7" fill="#0a3a6b"/>
  <!-- Nose -->
  <ellipse cx="50" cy="50" rx="3" ry="2.5" fill="#0a3a6b"/>
  <!-- Teeth row -->
  <rect x="38" y="55" width="24" height="7" rx="2" fill="#f5e6c8"/>
  <line x1="44" y1="55" x2="44" y2="62" stroke="#0a3a6b" stroke-width="1.5"/>
  <line x1="50" y1="55" x2="50" y2="62" stroke="#0a3a6b" stroke-width="1.5"/>
  <line x1="56" y1="55" x2="56" y2="62" stroke="#0a3a6b" stroke-width="1.5"/>
  <!-- Crossbones -->
  <line x1="18" y1="72" x2="82" y2="90" stroke="#f5e6c8" stroke-width="6" stroke-linecap="round"/>
  <line x1="82" y1="72" x2="18" y2="90" stroke="#f5e6c8" stroke-width="6" stroke-linecap="round"/>
  <!-- Bone ends -->
  <circle cx="18" cy="72" r="5" fill="#f5e6c8"/>
  <circle cx="82" cy="72" r="5" fill="#f5e6c8"/>
  <circle cx="18" cy="90" r="5" fill="#f5e6c8"/>
  <circle cx="82" cy="90" r="5" fill="#f5e6c8"/>
</svg>
